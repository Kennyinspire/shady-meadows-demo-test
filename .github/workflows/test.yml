name: B&B Demo — Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Nightly at 02:00 UTC — runs performance tests too
    - cron: '0 2 * * *'

env:
  BASE_URL:       ${{ secrets.BASE_URL || 'https://automationintesting.online' }}
  API_BASE_URL:   ${{ secrets.API_BASE_URL || 'https://automationintesting.online' }}
  ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'password' }}

jobs:
  # ─── Stage 1: API contract tests ─────────────────────────────────────────────
  api-tests:
    name: API tests (Newman)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman newman-reporter-junitfull

      - name: Run Postman collection
        run: |
          newman run postman/RestfulBookerPlatform.collection.json \
            --env-var "baseUrl=${{ env.API_BASE_URL }}" \
            --env-var "adminUsername=${{ env.ADMIN_USERNAME }}" \
            --env-var "adminPassword=${{ env.ADMIN_PASSWORD }}" \
            --reporters cli,junitfull \
            --reporter-junitfull-export results/api-results.xml

      - name: Upload API test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: results/api-results.xml
          retention-days: 30

  # ─── Stage 2: E2E UI tests ────────────────────────────────────────────────────
  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: api-tests  # Only run if API tests pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit
          path: results/e2e-results.xml
          retention-days: 30

      - name: Publish test summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Results
          path: results/e2e-results.xml
          reporter: java-junit

  # ─── Stage 3: Performance tests ───────────────────────────────────────────────
  performance-tests:
    name: Performance tests (k6)
    runs-on: ubuntu-latest
    needs: e2e-tests
    # Run nightly, on manual trigger, and on pushes to main
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run auth load test
        run: |
          k6 run k6/auth-load-test.js \
            --out json=results/k6-results.json
        env:
          K6_BASE_URL:    ${{ env.API_BASE_URL }}
          ADMIN_USERNAME: ${{ env.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: results/k6-results.json
          retention-days: 30

  # ─── Stage 4: Notify on failure ──────────────────────────────────────────────
  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests, performance-tests]
    if: >
      always() && github.ref == 'refs/heads/main' && (
        needs.api-tests.result == 'failure' ||
        needs.e2e-tests.result == 'failure' ||
        needs.performance-tests.result == 'failure'
      )

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":red_circle: Test failure on *${{ github.repository }}* — ${{ github.workflow }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
